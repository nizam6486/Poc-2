name: Deploy EKS with Ansible

on:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      working-directory:
       required: true
       default: Ansible
       type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}/${{ inputs.working-directory }}

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y unzip curl python3-pip
          pip3 install ansible boto3 botocore
          ansible-galaxy collection install community.aws

      # Step 4: Configure AWS credentials via OIDC role
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Deploy

      # Step 5: Validate AWS connectivity
      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # Step 6: Run the Ansible Playbook
      - name: Run Ansible Playbook to deploy EKS
        run: ansible-playbook create-eks.yml
