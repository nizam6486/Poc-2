---
- name: Provision AWS infrastructure and EKS cluster
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - amazon.aws
    - community.aws

  vars:
    region: us-east-1
    cluster_name: java-app-eks
    nodegroup_name: java-eks-ng
    ecr_repo_name: java-ecr
    vpc_cidr: "10.0.0.0/16"
    public_subnet_1: "10.0.1.0/24"
    public_subnet_2: "10.0.2.0/24"
    instance_type: t3.medium
    desired_size: 2
    min_size: 1
    max_size: 3

  tasks:
    # ---------------- VPC ----------------
    - name: Create VPC
      amazon.aws.ec2_vpc:
        name: "{{ cluster_name }}-vpc"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ region }}"
        tags:
          Name: "{{ cluster_name }}-vpc"
      register: vpc

    - name: Create Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        state: present
        region: "{{ region }}"
        tags:
          Name: "{{ cluster_name }}-igw"
      register: igw

    - name: Create Public Subnet 1
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ public_subnet_1 }}"
        az: "{{ region }}a"
        map_public: yes
        tags:
          Name: "{{ cluster_name }}-public-subnet-1"
      register: subnet1

    - name: Create Public Subnet 2
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ public_subnet_2 }}"
        az: "{{ region }}b"
        map_public: yes
        tags:
          Name: "{{ cluster_name }}-public-subnet-2"
      register: subnet2

    - name: Create Route Table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        tags:
          Name: "{{ cluster_name }}-rt"
      register: route_table

    - name: Add internet route to route table
      amazon.aws.ec2_route:
        route_table_id: "{{ route_table.route_table.id }}"
        destination_cidr_block: 0.0.0.0/0
        gateway_id: "{{ igw.gateway_id }}"
        state: present

    - name: Associate subnets with route table
      amazon.aws.ec2_vpc_route_table_association:
        route_table_id: "{{ route_table.route_table.id }}"
        subnet_id: "{{ item }}"
      loop:
        - "{{ subnet1.subnet.id }}"
        - "{{ subnet2.subnet.id }}"

    # ---------------- Security Group ----------------
    - name: Create security group for EKS nodes
      amazon.aws.ec2_security_group:
        name: "{{ cluster_name }}-sg"
        description: Security group for EKS nodes
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            from_port: 22
            to_port: 22
            cidr_ip: 0.0.0.0/0
          - proto: tcp
            from_port: 80
            to_port: 80
            cidr_ip: 0.0.0.0/0
          - proto: tcp
            from_port: 443
            to_port: 443
            cidr_ip: 0.0.0.0/0
        tags:
          Name: "{{ cluster_name }}-sg"
      register: sg

    # ---------------- IAM Roles ----------------
    - name: Create IAM role for EKS Cluster
      amazon.aws.iam_role:
        name: "{{ cluster_name }}-cluster-role"
        assume_role_policy_document: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Service": "eks.amazonaws.com"
                },
                "Action": "sts:AssumeRole"
              }
            ]
          }
      register: cluster_role

    - name: Attach EKS cluster policy
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ cluster_role.role.role_name }}"
        policy_arn: arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        state: present

    - name: Create IAM role for EKS NodeGroup
      amazon.aws.iam_role:
        name: "{{ cluster_name }}-node-role"
        assume_role_policy_document: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Service": "ec2.amazonaws.com"
                },
                "Action": "sts:AssumeRole"
              }
            ]
          }
      register: node_role

    - name: Attach node group policies
      amazon.aws.iam_policy:
        iam_type: role
        iam_name: "{{ node_role.role.role_name }}"
        policy_arn: "{{ item }}"
        state: present
      loop:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

    # ---------------- ECR Repository ----------------
    - name: Create ECR repository
      amazon.aws.ecr_repository:
        name: "{{ ecr_repo_name }}"
        state: present
        region: "{{ region }}"
      register: ecr

    # ---------------- EKS Cluster ----------------
    - name: Create EKS cluster
      community.aws.eks_cluster:
        name: "{{ cluster_name }}"
        version: "1.29"
        role_arn: "{{ cluster_role.role.arn }}"
        vpc:
          subnets:
            - "{{ subnet1.subnet.id }}"
            - "{{ subnet2.subnet.id }}"
          security_groups:
            - "{{ sg.group_id }}"
        region: "{{ region }}"
        wait: yes
        state: present
      register: eks

    # ---------------- NodeGroup ----------------
    - name: Create EKS NodeGroup
      community.aws.eks_nodegroup:
        cluster_name: "{{ cluster_name }}"
        name: "{{ nodegroup_name }}"
        node_role: "{{ node_role.role.arn }}"
        subnets:
          - "{{ subnet1.subnet.id }}"
          - "{{ subnet2.subnet.id }}"
        scaling_config:
          min_size: "{{ min_size }}"
          max_size: "{{ max_size }}"
          desired_size: "{{ desired_size }}"
        instance_types:
          - "{{ instance_type }}"
        region: "{{ region }}"
        wait: yes
        state: present
      register: nodegroup

    - name: Show output summary
      debug:
        msg:
          - "VPC: {{ vpc.vpc.id }}"
          - "Subnets: {{ subnet1.subnet.id }}, {{ subnet2.subnet.id }}"
          - "EKS Cluster: {{ eks.cluster.name }}"
          - "Nodegroup: {{ nodegroup.nodegroup.nodegroup_name }}"
          - "ECR Repo: {{ ecr.repository.repository_uri }}"