---
- name: Provision AWS infrastructure and EKS cluster
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - community.aws
  vars:
    region: us-east-1
    cluster_name: java-app-eks
    nodegroup_name: java-eks-ng
    ecr_repo_name: java-ecr
    vpc_cidr: "10.0.0.0/16"
    public_subnet_1: "10.0.1.0/24"
    public_subnet_2: "10.0.2.0/24"
    instance_type: t3.medium
    desired_size: 2
    min_size: 1
    max_size: 3

  tasks:
    # ---------------- VPC ----------------
    - name: Create VPC
      ec2_vpc_net:
        name: "{{ cluster_name }}-vpc"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ region }}"
        tags:
          Name: "{{ cluster_name }}-vpc"
      register: vpc

    - name: Create Internet Gateway
      ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        state: present
        region: "{{ region }}"
        tags:
          Name: "{{ cluster_name }}-igw"
      register: igw

    - name: Create Public Subnet 1
      ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ public_subnet_1 }}"
        az: "{{ region }}a"
        map_public: yes
        tags:
          Name: "{{ cluster_name }}-public-subnet-1"
      register: subnet1

    - name: Create Public Subnet 2
      ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ public_subnet_2 }}"
        az: "{{ region }}b"
        map_public: yes
        tags:
          Name: "{{ cluster_name }}-public-subnet-2"
      register: subnet2

    - name: Create Route Table
      ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        tags:
          Name: "{{ cluster_name }}-rt"
      register: route_table

    - name: Associate subnets with route table
      ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        route_table_id: "{{ route_table.route_table.id }}"
        subnets:
          - "{{ subnet1.subnet.id }}"
          - "{{ subnet2.subnet.id }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        state: present

    # ---------------- Security Group ----------------
    - name: Create security group for EKS nodes
      ec2_group:
        name: "{{ cluster_name }}-sg"
        description: Security group for EKS nodes
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ region }}"
        rules:
          - proto: tcp
            ports:
              - 22
              - 80
              - 443
            cidr_ip: 0.0.0.0/0
        tags:
          Name: "{{ cluster_name }}-sg"
      register: sg

    # ---------------- IAM Roles ----------------
    - name: Create IAM role for EKS Cluster
      iam_role:
        name: "{{ cluster_name }}-cluster-role"
        assume_role_policy_document: >
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": { "Service": "eks.amazonaws.com" },
              "Action": "sts:AssumeRole"
            }]
          }
      register: cluster_role

    - name: Attach managed policies to EKS cluster role
      iam_managed_policy:
        iam_type: role
        iam_name: "{{ cluster_role.role.name }}"
        policy_arn: "{{ item }}"
        state: present
      loop:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        - arn:aws:iam::aws:policy/AmazonEKSServicePolicy

    - name: Create IAM role for EKS NodeGroup
      iam_role:
        name: "{{ cluster_name }}-node-role"
        assume_role_policy_document: >
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": { "Service": "ec2.amazonaws.com" },
              "Action": "sts:AssumeRole"
            }]
          }
      register: node_role

    - name: Attach managed policies to node role
      iam_managed_policy:
        iam_type: role
        iam_name: "{{ node_role.role.name }}"
        policy_arn: "{{ item }}"
        state: present
      loop:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

    # ---------------- ECR Repository ----------------
    - name: Create ECR repository
      ecr_repository:
        name: "{{ ecr_repo_name }}"
        state: present
        region: "{{ region }}"
      register: ecr

    # ---------------- EKS Cluster ----------------
    - name: Create EKS cluster
      eks_cluster:
        name: "{{ cluster_name }}"
        version: "1.29"
        role_arn: "{{ cluster_role.role.arn }}"
        resources_vpc_config:
          subnetIds:
            - "{{ subnet1.subnet.id }}"
            - "{{ subnet2.subnet.id }}"
          securityGroupIds:
            - "{{ sg.group_id }}"
        region: "{{ region }}"
        wait: yes
        state: present
      register: eks

    # ---------------- NodeGroup ----------------
    - name: Create EKS NodeGroup
      eks_nodegroup:
        cluster_name: "{{ cluster_name }}"
        nodegroup_name: "{{ nodegroup_name }}"
        node_role_arn: "{{ node_role.role.arn }}"
        subnets:
          - "{{ subnet1.subnet.id }}"
          - "{{ subnet2.subnet.id }}"
        scaling_config:
          desired_size: "{{ desired_size }}"
          min_size: "{{ min_size }}"
          max_size: "{{ max_size }}"
        instance_types: ["{{ instance_type }}"]
        region: "{{ region }}"
        state: present
        wait: yes
      register: nodegroup

    - name: Show output summary
      debug:
        msg:
          - "VPC: {{ vpc.vpc.id }}"
          - "Subnets: {{ subnet1.subnet.id }}, {{ subnet2.subnet.id }}"
          - "EKS Cluster: {{ eks.cluster.name }}"
          - "Nodegroup: {{ nodegroup.nodegroup.nodegroupName }}"
          - "ECR Repo: {{ ecr.repository.repositoryUri }}"

